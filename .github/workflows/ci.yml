name: CI-CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: docker.io
  DOCKERHUB_REPOSITORY: viafluvial/via-fluvial-keycloak-themes

jobs:
  docker:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: vars
        run: |
          echo "image=${{ env.REGISTRY }}/${{ env.DOCKERHUB_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate DockerHub credentials
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${DOCKERHUB_USERNAME:-}" || -z "${DOCKERHUB_TOKEN:-}" ]]; then
            echo "DOCKERHUB_USERNAME/DOCKERHUB_TOKEN secrets must be set."
            exit 1
          fi

          if [[ "${DOCKERHUB_TOKEN}" == github_pat_* || "${DOCKERHUB_TOKEN}" == ghp_* ]]; then
            echo "DOCKERHUB_TOKEN appears to be a GitHub token. Configure a DockerHub token/password instead."
            exit 1
          fi

          if printf '%s' "${DOCKERHUB_TOKEN}" | grep -q '[[:space:]]'; then
            echo "DOCKERHUB_TOKEN contains whitespace/newline. Re-save the secret as a single line."
            exit 1
          fi

          if [[ "${DOCKERHUB_USERNAME}" == github-token ]]; then
            echo "DOCKERHUB_USERNAME is invalid for DockerHub. Use your DockerHub namespace/user (ex.: viafluvial)."
            exit 1
          fi

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/keycloak/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
