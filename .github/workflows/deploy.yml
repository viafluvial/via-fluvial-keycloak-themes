name: Deploy Production (DockerHub)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag da imagem Docker"
        required: true
        default: "26.0.0"
      push_latest:
        description: "Publicar tambem a tag latest"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

env:
  REGISTRY: docker.io
  DOCKERHUB_REPOSITORY: viafluvial/via-fluvial-keycloak-themes

jobs:
  build-and-push-image:
    name: Build and Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate DockerHub credentials
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${DOCKERHUB_USERNAME:-}" || -z "${DOCKERHUB_TOKEN:-}" ]]; then
            echo "DOCKERHUB_USERNAME/DOCKERHUB_TOKEN secrets must be set."
            exit 1
          fi

          if [[ "${DOCKERHUB_TOKEN}" == github_pat_* || "${DOCKERHUB_TOKEN}" == ghp_* ]]; then
            echo "DOCKERHUB_TOKEN appears to be a GitHub token. Configure a DockerHub token/password instead."
            exit 1
          fi

          if printf '%s' "${DOCKERHUB_TOKEN}" | grep -q '[[:space:]]'; then
            echo "DOCKERHUB_TOKEN contains whitespace/newline. Re-save the secret as a single line."
            exit 1
          fi

          if [[ "${DOCKERHUB_USERNAME}" == github-token ]]; then
            echo "DOCKERHUB_USERNAME is invalid for DockerHub. Use your DockerHub namespace/user (ex.: viafluvial)."
            exit 1
          fi

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image reference
        id: image
        run: |
          echo "ref=${{ env.REGISTRY }}/${{ env.DOCKERHUB_REPOSITORY }}:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          echo "latest_ref=${{ env.REGISTRY }}/${{ env.DOCKERHUB_REPOSITORY }}:latest" >> "$GITHUB_OUTPUT"
          if [[ "${{ inputs.push_latest }}" == "true" ]]; then
            echo "tags=${{ env.REGISTRY }}/${{ env.DOCKERHUB_REPOSITORY }}:${{ inputs.image_tag }},${{ env.REGISTRY }}/${{ env.DOCKERHUB_REPOSITORY }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${{ env.REGISTRY }}/${{ env.DOCKERHUB_REPOSITORY }}:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/keycloak/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
