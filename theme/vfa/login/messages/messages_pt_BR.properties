# -- Termos (texto padrao LGPD) ----------------------------------------------
termsText=<h3>Termos de Uso</h3><p><strong>1. Aceita\u00e7\u00e3o dos Termos</strong><br/>Ao acessar e usar a plataforma ViaFluvialAmaz\u00f4nia, voc\u00ea concorda em cumprir e estar vinculado aos termos e condi\u00e7\u00f5es de uso.</p><p><strong>2. Uso da Plataforma</strong><br/>Esta plataforma destina-se \u00e0 reserva de passagens e camarotes para transporte fluvial na regi\u00e3o amaz\u00f4nica.</p><p><strong>3. Privacidade e Dados Pessoais (LGPD)</strong><br/>Coletamos e processamos seus dados pessoais conforme nossa Pol\u00edtica de Privacidade, em conformidade com a Lei n\u00ba 13.709/2018.</p><p><strong>4. Seus Direitos</strong><br/>Voc\u00ea pode acessar, corrigir e solicitar a exclus\u00e3o dos seus dados, al\u00e9m de revogar o consentimento a qualquer momento.</p><p><strong>5. Contato</strong><br/>Privacidade: privacidade@viafluvial.am.gov.br \u2014 Encarregado (DPO): dpo@viafluvial.am.gov.br</p>

