# ============================================================================
# ViaFluvialAM - Tema de Login Keycloak 26
# Realm: vfa
# ============================================================================
# Herda o tema base "keycloak" para reutilizar macros (user-profile,
# register-commons, field, etc.) e sobrescreve toda a camada visual.
parent=keycloak
import=common/keycloak

# Idiomas suportados
locales=pt-BR

# Folhas de estilo (carregadas na ordem)
styles=css/styles.css

# Scripts (autofoco de OTP, medidor de força de senha, mostrar/ocultar senha)
scripts=js/script.js

# Mapeamento das classes do Keycloak para as classes do design ViaFluvialAM.
# Garante que campos gerados pelos macros do tema-pai (ex.: User Profile no
# registro) tambem fiquem estilizados conforme o design.
kcHtmlClass=vfa-html
kcBodyClass=vfa-body

kcLogoLink=https://www.viafluvial.am.gov.br
kcLogoClass=vfa-brand-logo

kcFormCardClass=vfa-card
kcFormHeaderClass=vfa-header
kcContentWrapperClass=vfa-content

kcFormGroupClass=vfa-form-group
kcFormGroupErrorClass=vfa-form-group--error
kcLabelClass=vfa-label
kcLabelWrapperClass=vfa-label-wrapper
kcInputClass=vfa-input
kcInputWrapperClass=vfa-input-wrapper
kcInputErrorMessageClass=vfa-input-error
kcInputHelperTextBeforeClass=vfa-input-helper
kcInputHelperTextAfterClass=vfa-input-helper

kcFormClass=vfa-form
kcFormSettingClass=vfa-form-setting
kcFormOptionsClass=vfa-form-options
kcFormButtonsClass=vfa-form-buttons

kcButtonClass=vfa-btn
kcButtonPrimaryClass=vfa-btn--primary
kcButtonSecondaryClass=vfa-btn--secondary
kcButtonDefaultClass=vfa-btn--outline
kcButtonLargeClass=vfa-btn--block
kcButtonBlockClass=vfa-btn--block

kcInputLargeClass=vfa-input--lg

kcFormSocialAccountListClass=vfa-social-list
kcFormSocialAccountListGridClass=vfa-social-list--grid
kcFormSocialAccountListButtonClass=vfa-btn vfa-btn--social
kcFormSocialAccountGridItem=vfa-social-grid-item
kcFormSocialAccountNameClass=vfa-social-name

kcAlertClass=vfa-alert
kcAlertTitleClass=vfa-alert-title

kcInputWarningClass=vfa-input--warning
kcFormPasswordVisibilityButtonClass=vfa-password-toggle
kcFormPasswordVisibilityIconShow=vfa-icon-eye
kcFormPasswordVisibilityIconHide=vfa-icon-eye-slash

kcSelectAuthListClass=vfa-auth-list
kcSelectAuthListItemClass=vfa-auth-item
kcSelectAuthListItemArrowClass=vfa-auth-item-arrow
kcSelectAuthListItemBodyClass=vfa-auth-item-body
kcSelectAuthListItemIconClass=vfa-auth-item-icon
kcSelectAuthListItemTitle=vfa-auth-item-title
kcSelectAuthListItemHelpTextClass=vfa-auth-item-help
